<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasalaKimchi</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: linear-gradient(135deg, #fff6f2, #fffdfb);
  color: #2c1b12;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 18px 50px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(14px);
  z-index: 1000;
}

nav h2 {
  color: #c24a3a;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #5a4337;
  font-weight: 500;
  position: relative;
}

nav a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  bottom: -4px;
  left: 0;
  background: #c24a3a;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 85px;
  color: #c24a3a;
  animation: fadeDown 1s ease;
}

.hero p {
  font-size: 20px;
  margin: 20px auto;
  max-width: 600px;
  color: #5a4337;
  animation: fadeUp 1.2s ease;
}

.hero button {
  padding: 14px 34px;
  border: none;
  background: #c24a3a;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(194,74,58,0.3);
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 28px;
  padding: 100px 70px;
}

.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  padding: 35px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.06);
  transition: 0.4s;
  opacity: 0;
  transform: translateY(40px);
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.card h3 {
  color: #c24a3a;
  margin-bottom: 10px;
}

/* FEATURE */
.feature {
  display: flex;
  align-items: center;
  gap: 60px;
  padding: 110px 70px;
}

.feature-text {
  flex: 1;
}

.feature-text h2 {
  font-size: 46px;
  margin-bottom: 15px;
}

.feature-img {
  flex: 1;
  height: 350px;
  border-radius: 30px;
  background: linear-gradient(135deg, #ffd9cc, #ffece2);
}

/* ANIMATIONS */
@keyframes fadeDown {
  from {opacity:0; transform: translateY(-40px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(40px);}
  to {opacity:1; transform: translateY(0);}
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  background: #ffece4;
}

/* MOBILE */
@media(max-width: 768px) {
  .hero h1 { font-size: 55px; }
  .feature { flex-direction: column; }
}
</style>
</head>

<body>

<nav>
  <h2>MasalaKimchi</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Explore</a>
    <a href="#">Culture</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1>MasalaKimchi</h1>
    <p>Aesthetic blend of India and Korea</p>
    <button onclick="scrollToCards()">Start Exploring</button>
  </div>
</section>

<section class="cards" id="cards">
  <div class="card"><h3>Culture</h3><p>Traditions and identity</p></div>
  <div class="card"><h3>Food</h3><p>Spice meets fermentation</p></div>
  <div class="card"><h3>Stories</h3><p>Emotion and drama</p></div>
  <div class="card"><h3>Connection</h3><p>Two worlds together</p></div>
</section>

<section class="feature">
  <div class="feature-text">
    <h2>India × Korea</h2>
    <p>Both cultures share warmth and expression.</p>
  </div>
  <div class="feature-img"></div>
</section>

<footer>
  MasalaKimchi © 2026
</footer>

<script>
function scrollToCards() {
  document.getElementById("cards").scrollIntoView({ behavior: "smooth" });
}

const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
  const trigger = window.innerHeight * 0.85;

  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;

    if(top < trigger){
      card.classList.add("show");
    }
  });
});
</script>

</body>
</html>
